<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | Acervo Lusófono</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] },
                    colors: {
                        paper: { 50: '#fdfbf7', 100: '#f8f4e6', 800: '#3d382e', 900: '#29251f' },
                        gold: { 200: '#f1e29e', 300: '#e5c965', 400: '#d5aa31', 900: '#5c410a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-paper-50 text-paper-900 font-sans antialiased min-h-screen flex flex-col">

    <main class="flex-grow py-12">
        <div class="max-w-3xl mx-auto px-4 sm:px-6">
            
            <a href="{{ "" | relURL }}" class="text-paper-800 mb-8 inline-flex items-center gap-2 hover:text-gold-900 transition-colors uppercase text-xs font-bold tracking-widest">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Voltar ao Acervo
            </a>

            <article class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
                <div class="bg-paper-800 p-8 md:p-12 text-center border-b-8 border-gold-400">
                    <span class="text-paper-100 text-xs font-semibold uppercase tracking-widest mb-4 block opacity-80">{{ .Params.autor }}</span>
                    <h1 class="font-serif text-white text-4xl md:text-5xl font-bold leading-tight">{{ .Title }}</h1>
                    <div class="mt-6 flex justify-center gap-4 text-paper-100/60 text-sm uppercase tracking-wider">
                        <span>{{ .Params.ano }}</span>
                        <span>•</span>
                        <span>{{ .Params.categoria }}</span>
                    </div>
                </div>

                <div class="p-8 md:p-12">
                    <div class="prose prose-paper max-w-none font-serif text-lg leading-relaxed text-gray-800">
                        {{ .Content }}
                    </div>

                    <div class="mt-12 pt-8 border-t border-gray-100 flex flex-col sm:flex-row gap-4">
                        <a href="{{ printf "downloads/%s.pdf" .File.TranslationBaseName | relURL }}" 
                           class="flex-1 text-center bg-paper-900 text-white font-bold py-4 px-6 rounded-xl hover:bg-gold-900 transition-all shadow-lg hover:shadow-gold-200/50 flex items-center justify-center gap-3">
                           <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                           BAIXAR PDF (EDIDÇÃO DE LUXO)
                        </a>
                        
                        <a href="{{ printf "downloads/%s.epub" .File.TranslationBaseName | relURL }}" 
                           class="flex-1 text-center bg-white text-paper-900 border-2 border-paper-900 font-bold py-4 px-6 rounded-xl hover:bg-paper-50 transition-all flex items-center justify-center gap-3">
                           <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.168 0.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332 0.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332 0.477-4.5 1.253"></path></svg>
                           BAIXAR EPUB
                        </a>
                    </div>
                </div>
            </article>

        </div>
    </main>

    <footer class="bg-paper-100 border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-8 text-center">
            <p class="text-sm text-paper-800 font-medium tracking-wide uppercase">Acervo Lusófono - Domínio Público</p>
            <p class="text-xs text-gray-500 mt-2 italic">Promovendo o acesso universal à literatura em língua portuguesa.</p>
        </div>
    </footer>

</body>
</html>

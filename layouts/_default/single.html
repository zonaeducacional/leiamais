<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{{ .Title }} | Acervo Lusófono</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 p-8 font-sans">

    <div class="max-w-2xl mx-auto bg-white p-8 shadow rounded">
        <a href="{{ .Site.BaseURL }}" class="text-blue-600 mb-4 inline-block hover:underline font-medium">← Voltar ao Acervo</a>
        
        <h1 class="text-3xl font-bold font-serif">{{ .Title }}</h1>
        <p class="text-lg text-gray-600 mb-6">por <strong>{{ .Params.autor }}</strong> ({{ .Params.ano }})</p>

        <div class="prose mb-8">
            {{ .Content }}
        </div>

        <div class="flex gap-4 border-t pt-6">
            <a href="/downloads/{{ .File.TranslationBaseName }}.pdf" class="bg-yellow-600 text-white px-4 py-2 rounded font-bold">Baixar PDF</a>
            <a href="/downloads/{{ .File.TranslationBaseName }}.epub" class="bg-yellow-600 text-white px-4 py-2 rounded font-bold">Baixar ePub</a>
        </div>
    </div>

</body>
</html>

backend:
  name: git-gateway
  repo: zonaeducacional/leiamais
  branch: main
  site_domain: literaplus.netlify.app

display_url: https://zonaeducacional.github.io/leiamais
local_backend: true

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "livros"
    label: "Livros"
    folder: "content/livros"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Autor", name: "autor", widget: "string" }
      - { label: "Ano", name: "ano", widget: "string" }
      - { label: "Categoria", name: "categoria", widget: "string" }
      - { label: "Capa do Livro", name: "capa", widget: "image", required: false }
      - { label: "Sinopse", name: "sinopse", widget: "text" }
      - { label: "ID Gutenberg (Opcional)", name: "gutenberg_id", widget: "string", required: false }
      - { label: "Link PDF Externo (Opcional)", name: "pdf_externo", widget: "string", required: false }
      - { label: "Link EPUB Externo (Opcional)", name: "epub_externo", widget: "string", required: false }
      - { label: "Fonte do Livro (Ex: BN, Gutenberg)", name: "fonte", widget: "string", required: false }
      - { label: "Texto do Livro (Opcional)", name: "body", widget: "markdown", required: false }

  - name: "importar"
    label: "🚀 Importar Novo Livro"
    folder: "content/importar"
    create: true
    slug: "importar-{{title}}"
    fields:
      - { label: "ID Gutenberg", name: "gutenberg_id", widget: "string" }
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Autor", name: "autor", widget: "string" }
      - { label: "Ano", name: "ano", widget: "string" }
      - { label: "Categoria", name: "categoria", widget: "string" }
      - { label: "Capa do Livro (URL ou Upload)", name: "capa", widget: "image", required: false }
backend:
  name: github
  repo: zonaeducacional/leiamais
  branch: main
  base_url: https://zonaeducacional.github.io/leiamais/
  auth_endpoint: admin/#

display_url: https://zonaeducacional.github.io/leiamais
local_backend: true # Isto permite-lhe testar no computador antes de subir

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "livros"
    label: "Livros"
    folder: "content/livros"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Autor", name: "autor", widget: "string" }
      - { label: "Ano", name: "ano", widget: "string" }
      - { label: "Categoria", name: "categoria", widget: "string" }
      - { label: "Texto do Livro", name: "body", widget: "markdown" }